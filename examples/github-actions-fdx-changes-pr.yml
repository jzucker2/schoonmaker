# Pull requests: diff each changed .fdx vs the PR base branch.
#
# Copy with requirements-ci.txt (see examples/README.md).
# For pushes to main, use github-actions-fdx-changes-push.yml.

name: FDX changes (pull request)

on:
  pull_request:
    paths:
      - '**/*.fdx'
      - '**/*.FDX'

jobs:
  diff-fdx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install schoonmaker
        run: pip install -r requirements-ci.txt

      - name: Parse and diff changed FDX files
        env:
          CI_FDX_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CI_FDX_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # Optional: CI_FDX_LIST_ITEMS / CI_FDX_DISPLAY_BOARDS = 1, true, yes, on
          # or add --list-items / --display-boards to the run command.
        run: schoonmaker ci-fdx-diff -o fdx-reports

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fdx-analysis-pr
          path: fdx-reports/
